# ─────────────────────────────────────────────────────────────
# NeuralCalm — cloud builds, no local Flutter needed.
#
# The repo ships only lib/ + assets/ + pubspec.yaml. Each build:
#  1. generates the android/ and ios/ native folders,
#  2. applies required Android tweaks (minSdk 23 for Firebase,
#     INTERNET permission for release builds),
#  3. generates the app launcher icon from assets/icon/app_icon.png,
#  4. builds.
# ─────────────────────────────────────────────────────────────

definitions:
  scripts:
    - &create_platforms
      name: Generate native platform folders
      script: |
        cp pubspec.yaml pubspec.keep.yaml
        flutter create . --org com.neuralcalm --project-name neuralcalm --platforms=android,ios
        mv -f pubspec.keep.yaml pubspec.yaml
    - &android_tweaks
      name: Android tweaks (minSdk 23 + INTERNET permission)
      script: |
        for f in android/app/build.gradle android/app/build.gradle.kts; do
          if [ -f "$f" ]; then sed -i.bak 's/flutter.minSdkVersion/23/g' "$f"; fi
        done
        M=android/app/src/main/AndroidManifest.xml
        if [ -f "$M" ] && ! grep -q "android.permission.INTERNET" "$M"; then
          sed -i.bak 's|<application|<uses-permission android:name="android.permission.INTERNET"/><application|' "$M"
        fi
    - &pub_get
      name: Get packages
      script: flutter pub get
    - &launcher_icons
      name: Generate app launcher icons
      script: dart run flutter_launcher_icons

workflows:

  # 1) Runs automatically on every push to main → debug APK for your phone.
  android-debug:
    name: Android debug APK
    max_build_duration: 60
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - *create_platforms
      - *android_tweaks
      - *pub_get
      - *launcher_icons
      - name: Build debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  # 2) Start manually when we reach Play Store prep.
  #    Before first store upload: add your keystore in
  #    Codemagic → Code signing identities, then attach it here.
  android-release:
    name: Android release AAB (Play Store - manual)
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - *create_platforms
      - *android_tweaks
      - *pub_get
      - *launcher_icons
      - name: Build release AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab

  # 3) Start manually. Verifies the iOS build compiles (Codemagic
  #    machines are Macs). Device installs / App Store need your
  #    Apple Developer account connected — done at store-prep time.
  ios-verify:
    name: iOS build check (unsigned - manual)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - *create_platforms
      - *pub_get
      - *launcher_icons
      - name: Build iOS (unsigned)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
