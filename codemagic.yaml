# ─────────────────────────────────────────────────────────────
# NeuralCalm — cloud builds, no local Flutter needed.
#
# The repo ships only lib/ + assets/ + pubspec.yaml. Each build:
#  1. generates the android/ and ios/ native folders,
#  2. applies required Android tweaks (minSdk 23 for Firebase,
#     INTERNET permission for release builds),
#  3. generates the app launcher icon from assets/icon/app_icon.png,
#  4. builds.
# ─────────────────────────────────────────────────────────────

definitions:
  scripts:
    - &create_platforms
      name: Generate native platform folders
      script: |
        cp pubspec.yaml pubspec.keep.yaml
        flutter create . --org com.neuralcalm --project-name neuralcalm --platforms=android,ios
        mv -f pubspec.keep.yaml pubspec.yaml
    - &android_tweaks
      name: Android tweaks (minSdk 26 + INTERNET + Health Connect)
      script: |
        for f in android/app/build.gradle android/app/build.gradle.kts; do
          if [ -f "$f" ]; then sed -i.bak 's/flutter.minSdkVersion/26/g' "$f"; fi
        done
        M=android/app/src/main/AndroidManifest.xml
        if [ -f "$M" ] && ! grep -q "android.permission.INTERNET" "$M"; then
          sed -i.bak 's|<application|<uses-permission android:name="android.permission.INTERNET"/><application|' "$M"
        fi
        python3 - <<'PYEOF'
        import re
        M='android/app/src/main/AndroidManifest.xml'
        s=open(M).read()
        perms=''.join(f'<uses-permission android:name="android.permission.health.{p}"/>' for p in
          ['READ_STEPS','READ_SLEEP','READ_HEART_RATE','READ_RESTING_HEART_RATE','READ_HEART_RATE_VARIABILITY','READ_OXYGEN_SATURATION','READ_DISTANCE','READ_ACTIVE_CALORIES_BURNED','READ_TOTAL_CALORIES_BURNED','READ_BODY_TEMPERATURE','READ_BLOOD_PRESSURE'])
        if 'health.READ_STEPS' not in s:
            s=s.replace('<application', perms+'<application',1)
        if 'ACTION_SHOW_PERMISSIONS_RATIONALE' not in s:
            ratio='<intent-filter><action android:name="androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE"/></intent-filter>'
            s=re.sub(r'(<activity\b[^>]*\.MainActivity.*?)</activity>', lambda m: m.group(1)+ratio+'</activity>', s, count=1, flags=re.S)
        if 'ViewPermissionUsageActivity' not in s:
            alias=('<activity-alias android:name="ViewPermissionUsageActivity" android:exported="true" '
                   'android:targetActivity=".MainActivity" android:permission="android.permission.START_VIEW_PERMISSION_USAGE">'
                   '<intent-filter><action android:name="android.intent.action.VIEW_PERMISSION_USAGE"/>'
                   '<category android:name="android.intent.category.HEALTH_PERMISSIONS"/></intent-filter></activity-alias>')
            s=s.replace('</application>', alias+'</application>',1)
        open(M,'w').write(s)
        print('Health Connect manifest entries injected')
        PYEOF
    - &pub_get
      name: Get packages
      script: flutter pub get
    - &launcher_icons
      name: Generate app launcher icons
      script: dart run flutter_launcher_icons

workflows:

  # 1) Runs automatically on every push to main → debug APK for your phone.
  android-debug:
    name: Android debug APK
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - keys
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - *create_platforms
      - *android_tweaks
      - *pub_get
      - *launcher_icons
      - name: Build debug APK
        script: flutter build apk --debug --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY --dart-define=ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  # 2) Start manually when we reach Play Store prep.
  #    Before first store upload: add your keystore in
  #    Codemagic → Code signing identities, then attach it here.
  android-release:
    name: Android release AAB (Play Store - manual)
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - keys
    scripts:
      - *create_platforms
      - *android_tweaks
      - *pub_get
      - *launcher_icons
      - name: Build release AAB
        script: flutter build appbundle --release --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY --dart-define=ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
    artifacts:
      - build/app/outputs/bundle/release/*.aab

  # 3) Start manually. Verifies the iOS build compiles (Codemagic
  #    machines are Macs). Device installs / App Store need your
  #    Apple Developer account connected — done at store-prep time.
  ios-verify:
    name: iOS build check (unsigned - manual)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - keys
    scripts:
      - *create_platforms
      - *pub_get
      - *launcher_icons
      - name: Build iOS (unsigned)
        script: flutter build ios --release --no-codesign --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY --dart-define=ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
    artifacts:
      - build/ios/iphoneos/*.app
